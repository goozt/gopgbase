version: '3'

env:
  GOCOVERDIR: ./coverage

tasks:
  _install-ineffassign: { cmds: [ go install github.com/gordonklaus/ineffassign@latest ],  status: [ which ineffassign ] }
  _install-misspell: {cmds: [ go install github.com/client9/misspell/cmd/misspell@latest ], status: [ which misspell ] }
  _install-gocyclo: { cmds: [ go install github.com/fzipp/gocyclo/cmd/gocyclo@latest ], status: [ which gocyclo ] }
  _install-golangci: { cmds: [ go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest ], status: [ which golangci-lint ] }
  _install-gotests: { cmds: [ go install github.com/cweill/gotests/gotests@latest ], status: [ which gotests ] }
  _install-mockgen: { cmds: [ go install go.uber.org/mock/mockgen@latest ], status: [ which mockgen ] }
  _install-air: { cmds: [ go install github.com/air-verse/air@latest ], status: [ which air ] }
  _install-fieldalignment: { cmds: [ go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest ], status: [ which fieldalignment ] }
  _install-govulncheck: { cmds: [ go install golang.org/x/vuln/cmd/govulncheck@latest ], status: [ which govulncheck ] }

  init:
    desc: Initialize development environment
    deps:
      - _install-ineffassign
      - _install-misspell
      - _install-gocyclo
      - _install-golangci
      - _install-gotests
      - _install-mockgen
      - _install-air
      - _install-fieldalignment
      - _install-govulncheck

  fieldalignment-fix:
    desc: Fix field alignment issues
    cmds:
      - fieldalignment -fix ./...

  lint:
    desc: Check if code is ready for version bump
    deps:
      - fieldalignment-fix
    cmds:
      - gofmt -l -s -w .
      - golangci-lint run
      - govulncheck ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  cover:
    desc: Run tests with coverage
    cmds:
      - mkdir -p {{.GOCOVERDIR}}
      - go test -coverprofile={{.GOCOVERDIR}}/tests.out ./...
      - go tool cover -html={{.GOCOVERDIR}}/tests.out -o {{.GOCOVERDIR}}/coverage.html

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  gen:
    desc: Generate mocks and code
    cmds:
      - mkdir -p mocks
      - mockgen -source=datastore.go -destination=mocks/datastore_mock.go -package=mocks

  example:
    desc: "Run a specific example (usage: task example -- postgres)"
    cmds:
      - go run ./examples/main_{{.CLI_ARGS}}.go

  examples:
    desc: Run all examples sequentially
    cmds:
      - for: [postgres, supabase, cockroach, neon, redshift, timescale]
        cmd: echo "Running {{.ITEM}} example..." && go build ./examples/main_{{.ITEM}}.go

  dev:
    desc: Development mode with hot reload
    cmds:
      - air -c .air.toml

  ci:
    desc: Full CI pipeline (lint + test + cover)
    cmds:
      - task: lint
      - task: test
      - task: testcover

  profile-size:
    desc: Analyze binary size contribution by dependency
    cmds:
      - mkdir -p tmp
      - go test -c -o tmp/size-profile.exe .
      - |
        echo "=== Top packages by binary size contribution ==="
        go tool nm -size tmp/size-profile.exe |
          awk '{
            sym=$4; n=split(sym, a, "/")
            if (sym ~ /^github\.com\//) { pkg=a[1]"/"a[2]"/"a[3]; sub(/\..*/, "", a[3]); pkg=a[1]"/"a[2]"/"a[3] }
            else if (sym ~ /^go\.opentelemetry\.io\//) { pkg=a[1]"/"a[2] }
            else if (sym ~ /^google\.golang\.org\//) { pkg=a[1]"/"a[2] }
            else if (sym ~ /^golang\.org\//) { pkg=a[1]"/"a[2]"/"a[3] }
            else if (sym ~ /^gopkg\.in\//) { pkg=a[1]"/"a[2] }
            else { split(sym, b, "."); pkg=b[1] }
            size[pkg]+=$2
          } END { for (p in size) printf "%10.2f KB  %s\n", size[p]/1024, p }' |
          sort -rn | head -30

  clean:
    desc: Clean generated artifacts
    cmds:
      - rm -rf {{.GOCOVERDIR}}
      - rm -rf mocks/
      - rm -rf tmp/
