file_format: 1.0.0

receivers:
  # OTLP receiver — applications push traces, metrics, and logs here
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Pull Prometheus metrics from the collector itself
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 10s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  # Drop noisy spans (health checks, readiness probes)
  filter/drop_health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.route"] == "/healthz"'
        - 'attributes["http.route"] == "/readyz"'
        - 'attributes["http.route"] == "/-/healthy"'

  # Batch for efficiency
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: service.namespace
        value: gopgbase
        action: upsert

  # Memory limiter — prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Export metrics to Prometheus (scraped by gopgbase_prometheus)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: gopgbase
    send_timestamps: true
    metric_expiration: 3m

  # Debug logging — reduce to "basic" or remove in production
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, filter/drop_health, resource, batch]
      exporters:  [debug]

    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters:  [prometheus, debug]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [debug]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: warn
